services:
  - type: web
    name: groww-mf-rag-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false # Set this manually in Render dashboard
      - key: PYTHONPATH
        value: .
