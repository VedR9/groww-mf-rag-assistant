name: Data Refresh Pipeline

on:
  schedule:
    # Run every Sunday at 02:00 UTC
    - cron: '0 2 * * 0'
  workflow_dispatch: 
    # Allows manual triggering from the GitHub UI

jobs:
  refresh-index:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run Refresh Pipeline Orchestrator (Phase 1.7)
        run: |
          python -m src.ingest 1.7

      - name: Commit and push updated index artifacts
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "chore: automated corpus refresh and index build [skip ci]" || echo "No changes to commit"
          git push
