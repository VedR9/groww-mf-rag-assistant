name: Data Refresh Pipeline

on:
  schedule:
    # Run every day at 10:00 AM IST (04:30 UTC)
    - cron: '30 4 * * *'
  workflow_dispatch: 
    # Allows manual triggering from the GitHub UI

jobs:
  refresh-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run Refresh Pipeline Orchestrator (Phase 1.7)
        run: |
          python -m src.ingest 1.7

      - name: Upload updated index to HuggingFace Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface_hub
          python -c "
          from huggingface_hub import HfApi
          import os
          api = HfApi()
          api.upload_folder(
              folder_path='data/index',
              path_in_repo='data/index',
              repo_id='VedR9/groww-mf-rag-backend',
              repo_type='space',
              token=os.environ.get('HF_TOKEN')
          )
          "
